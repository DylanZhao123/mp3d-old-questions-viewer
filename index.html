<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MP3D Imagination Question Viewer</title>
  <style>
    :root {
      --bg: #f5f6f8;
      --panel: #ffffff;
      --soft: #eef2f6;
      --line: #d8e0e8;
      --text: #17202a;
      --muted: #607080;
      --accent: #1f6feb;
      --accent-soft: #e7f0ff;
      --oracle: #0f7a5a;
      --shadow: 0 8px 24px rgba(17, 24, 39, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button, input { font: inherit; }

    .app {
      display: grid;
      grid-template-columns: 330px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: #fbfcfd;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 18px;
      border-bottom: 1px solid var(--line);
    }

    .title {
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.25;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .pill {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--muted);
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
      white-space: nowrap;
    }

    .search {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 8px;
      padding: 10px 12px;
      outline: none;
    }

    .search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(31, 111, 235, 0.14);
    }

    .list {
      overflow: auto;
      padding: 10px;
    }

    .item {
      width: 100%;
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      text-align: left;
      border: 1px solid transparent;
      background: transparent;
      border-radius: 8px;
      padding: 8px;
      color: var(--text);
      cursor: pointer;
    }

    .item:hover { background: var(--soft); }

    .item.active {
      background: var(--accent-soft);
      border-color: #bad6ff;
    }

    .rank {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--panel);
      border: 1px solid var(--line);
      color: #174ea6;
      font-weight: 750;
    }

    .item-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 700;
    }

    .item-meta {
      margin-top: 3px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 12px;
    }

    .main {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(245, 246, 248, 0.96);
      backdrop-filter: blur(10px);
    }

    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .button, .tab {
      min-height: 38px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 8px;
      cursor: pointer;
      padding: 0 12px;
      font-weight: 650;
    }

    .button.icon {
      width: 42px;
      padding: 0;
      font-size: 20px;
      line-height: 1;
    }

    .tab.active {
      border-color: #96c0fb;
      background: var(--accent-soft);
      color: #174ea6;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 0 10px;
      color: var(--muted);
      user-select: none;
    }

    .toggle input {
      width: 17px;
      height: 17px;
      accent-color: var(--accent);
    }

    .content {
      width: min(1600px, 100%);
      margin: 0 auto;
      padding: 18px;
    }

    .summary {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 16px;
    }

    .summary-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      margin-bottom: 10px;
    }

    .summary h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
    }

    .scan {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .question {
      margin: 0;
      color: #24303d;
      font-size: 16px;
      line-height: 1.55;
    }

    .answer {
      display: none;
      margin-top: 14px;
      border: 1px solid #bfe4d9;
      background: #edf8f5;
      border-radius: 8px;
      padding: 13px 14px;
      color: #123e34;
    }

    .answer.visible { display: block; }

    .answer h2 {
      margin: 0 0 7px;
      color: var(--oracle);
      font-size: 14px;
    }

    .answer p {
      margin: 0;
      line-height: 1.5;
      font-size: 15px;
    }

    .panel-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      align-items: start;
    }

    .panel-grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .panel-grid.single { grid-template-columns: 1fr; }

    .figure, .metric-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .figure-header {
      min-height: 42px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding: 9px 12px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
      font-size: 14px;
      font-weight: 750;
    }

    .figure-header span:last-child {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .figure img {
      display: block;
      width: 100%;
      background: #10151b;
      object-fit: contain;
    }

    .view-img { aspect-ratio: 4 / 3; }
    .wide-img { aspect-ratio: 16 / 5; }
    .map-img { aspect-ratio: 1 / 1; background: #fff; }

    .oracle-only { display: none; }
    .show-oracle .oracle-only { display: block; }

    .section-title {
      margin: 20px 0 10px;
      font-size: 16px;
      line-height: 1.25;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      padding: 12px;
    }

    .metric {
      border: 1px solid var(--line);
      background: #fbfcfd;
      border-radius: 8px;
      padding: 10px;
      min-width: 0;
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .metric-value {
      font-size: 14px;
      font-weight: 720;
      overflow-wrap: anywhere;
    }

    .hidden { display: none; }

    .empty {
      padding: 18px;
      color: var(--muted);
    }

    @media (max-width: 1100px) {
      .app { grid-template-columns: 1fr; }
      .sidebar {
        max-height: 330px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .topbar {
        position: static;
        align-items: flex-start;
      }
      .panel-grid,
      .panel-grid.three {
        grid-template-columns: 1fr;
      }
      .metrics { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1 class="title">MP3D Imagination Viewer</h1>
        <div class="stats">
          <span class="pill">20 curated samples</span>
          <span class="pill">A/B input</span>
          <span class="pill">C oracle</span>
          <span class="pill">Depth + labels</span>
        </div>
        <input id="search" class="search" type="search" placeholder="Search scan, room, answer">
      </div>
      <div id="list" class="list"></div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="toolbar">
          <button id="prev" class="button icon" title="Previous" aria-label="Previous">&#8249;</button>
          <button id="next" class="button icon" title="Next" aria-label="Next">&#8250;</button>
          <button id="tabQuestion" class="tab active" type="button">Question</button>
          <button id="tabModalities" class="tab" type="button">Modalities</button>
        </div>
        <label class="toggle">
          <input id="showOracle" type="checkbox">
          <span>Show hidden C</span>
        </label>
      </div>

      <section id="content" class="content">
        <article class="summary">
          <div class="summary-head">
            <h1 id="itemTitle">Loading</h1>
            <span id="scan" class="scan"></span>
          </div>
          <p id="question" class="question"></p>
          <div id="answer" class="answer">
            <h2>Hidden oracle answer</h2>
            <p id="answerText"></p>
          </div>
        </article>

        <section id="questionView">
          <div id="imageGrid" class="panel-grid">
            <figure class="figure">
              <div class="figure-header"><span>View A</span><span>model input</span></div>
              <img id="viewA" class="view-img" alt="View A">
            </figure>
            <figure class="figure">
              <div class="figure-header"><span>View B</span><span>model input</span></div>
              <img id="viewB" class="view-img" alt="View B">
            </figure>
            <figure class="figure oracle-only">
              <div class="figure-header"><span>View C</span><span>oracle only</span></div>
              <img id="viewC" class="view-img" alt="Hidden View C">
            </figure>
          </div>
        </section>

        <section id="modalitiesView" class="hidden">
          <h2 class="section-title">Connectivity Graph</h2>
          <div class="panel-grid single">
            <figure class="figure">
              <div class="figure-header"><span>Connectivity Graph</span><span>local top-down</span></div>
              <img id="connectivity" class="map-img" alt="Connectivity graph">
            </figure>
          </div>

          <h2 class="section-title">Viewpoint Graph Distance</h2>
          <div class="metric-panel">
            <div class="figure-header"><span>Graph Distance</span><span>start to hidden C</span></div>
            <div id="graphDistanceMetrics" class="metrics"></div>
          </div>

          <h2 class="section-title">Room Label</h2>
          <div class="metric-panel">
            <div class="figure-header"><span>Room Labels</span><span>MP3D semantic metadata</span></div>
            <div id="roomLabelMetrics" class="metrics"></div>
          </div>

          <h2 class="section-title">Depth Maps</h2>
          <div id="depthGrid" class="panel-grid three"></div>

          <h2 class="section-title">360 Heading Sweeps</h2>
          <div class="panel-grid single">
            <figure class="figure">
              <div class="figure-header"><span>Start Viewpoint</span><span>12 headings</span></div>
              <img id="start360" class="wide-img" alt="Start viewpoint 360 sweep">
            </figure>
            <figure class="figure">
              <div class="figure-header"><span>Hidden C Viewpoint</span><span>12 headings</span></div>
              <img id="hidden360" class="wide-img" alt="Hidden viewpoint 360 sweep">
            </figure>
          </div>

          <h2 class="section-title">Skybox Panoramas</h2>
          <div class="panel-grid">
            <figure class="figure">
              <div class="figure-header"><span>Start Skybox</span><span>panorama</span></div>
              <img id="startSkybox" class="wide-img" alt="Start skybox panorama">
            </figure>
            <figure class="figure">
              <div class="figure-header"><span>Hidden C Skybox</span><span>panorama</span></div>
              <img id="hiddenSkybox" class="wide-img" alt="Hidden skybox panorama">
            </figure>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script>
    const state = {
      records: [],
      filtered: [],
      index: 0,
      tab: "question"
    };

    const el = {
      list: document.getElementById("list"),
      search: document.getElementById("search"),
      prev: document.getElementById("prev"),
      next: document.getElementById("next"),
      tabQuestion: document.getElementById("tabQuestion"),
      tabModalities: document.getElementById("tabModalities"),
      showOracle: document.getElementById("showOracle"),
      content: document.getElementById("content"),
      itemTitle: document.getElementById("itemTitle"),
      scan: document.getElementById("scan"),
      question: document.getElementById("question"),
      answer: document.getElementById("answer"),
      answerText: document.getElementById("answerText"),
      imageGrid: document.getElementById("imageGrid"),
      questionView: document.getElementById("questionView"),
      modalitiesView: document.getElementById("modalitiesView"),
      viewA: document.getElementById("viewA"),
      viewB: document.getElementById("viewB"),
      viewC: document.getElementById("viewC"),
      connectivity: document.getElementById("connectivity"),
      graphDistanceMetrics: document.getElementById("graphDistanceMetrics"),
      roomLabelMetrics: document.getElementById("roomLabelMetrics"),
      depthGrid: document.getElementById("depthGrid"),
      start360: document.getElementById("start360"),
      hidden360: document.getElementById("hidden360"),
      startSkybox: document.getElementById("startSkybox"),
      hiddenSkybox: document.getElementById("hiddenSkybox")
    };

    function formatNumber(value, digits = 2) {
      if (value === null || value === undefined || Number.isNaN(Number(value))) return "n/a";
      return Number(value).toFixed(digits);
    }

    function roomText(room) {
      if (!room || !room.room_label) return "n/a";
      return room.room_label;
    }

    function currentRecord() {
      return state.filtered[state.index];
    }

    function renderList() {
      el.list.innerHTML = "";
      if (!state.filtered.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No matching samples.";
        el.list.appendChild(empty);
        return;
      }
      state.filtered.forEach((record, idx) => {
        const button = document.createElement("button");
        button.className = `item${idx === state.index ? " active" : ""}`;
        button.type = "button";
        button.innerHTML = `
          <span class="rank">${record.rank}</span>
          <span>
            <span class="item-title">${record.scanId}</span>
            <span class="item-meta">${roomText(record.modalities.room.start)} -> ${roomText(record.modalities.room.hidden)}</span>
          </span>
        `;
        button.addEventListener("click", () => {
          state.index = idx;
          render();
        });
        el.list.appendChild(button);
      });
    }

    function metric(label, value) {
      return `<div class="metric"><div class="metric-label">${label}</div><div class="metric-value">${value}</div></div>`;
    }

    function renderGraphDistance(record) {
      const graph = record.modalities.graphDistance;
      el.graphDistanceMetrics.innerHTML = [
        metric("Euclidean distance", `${formatNumber(graph.euclidean_distance_m)} m`),
        metric("Shortest graph distance", `${formatNumber(graph.shortest_graph_distance_m)} m`),
        metric("Graph hops", graph.shortest_graph_hops ?? "n/a"),
        metric("Generator movement distance", `${formatNumber(graph.generator_recorded_movement_distance_m)} m`)
      ].join("");
    }

    function renderRoomLabels(record) {
      const room = record.modalities.room;
      el.roomLabelMetrics.innerHTML = [
        metric("Start room", roomText(room.start)),
        metric("Hidden C room", roomText(room.hidden))
      ].join("");
    }

    function depthFigure(name, label, data) {
      const stats = data.stats || {};
      return `
        <figure class="figure">
          <div class="figure-header"><span>${label}</span><span>${formatNumber(stats.median_m)} m median</span></div>
          <img class="view-img" src="${data.color}" alt="${label} depth map">
          <div class="metrics">
            ${metric("Valid pixels", `${formatNumber((stats.valid_pixel_ratio || 0) * 100, 1)}%`)}
            ${metric("Min / max", `${formatNumber(stats.min_m)} m / ${formatNumber(stats.max_m)} m`)}
            ${metric("Color scale", `${formatNumber(stats.color_scale_p02_m)} m to ${formatNumber(stats.color_scale_p98_m)} m`)}
          </div>
        </figure>
      `;
    }

    function renderDetail() {
      const record = currentRecord();
      if (!record) return;
      const showOracle = el.showOracle.checked;
      el.content.classList.toggle("show-oracle", showOracle);
      el.imageGrid.className = `panel-grid${showOracle ? " three" : ""}`;
      el.answer.classList.toggle("visible", showOracle);

      el.itemTitle.textContent = `Sample ${record.rank}: ${record.itemId}`;
      el.scan.textContent = `scan ${record.scanId}`;
      el.question.textContent = record.question;
      el.answerText.textContent = record.answer;
      el.viewA.src = record.views.A;
      el.viewB.src = record.views.B;
      el.viewC.src = record.views.C;

      el.connectivity.src = record.modalities.connectivity;
      el.start360.src = record.modalities.start360;
      el.hidden360.src = record.modalities.hidden360;
      el.startSkybox.src = record.modalities.startSkybox;
      el.hiddenSkybox.src = record.modalities.hiddenSkybox;
      renderGraphDistance(record);
      renderRoomLabels(record);
      el.depthGrid.innerHTML = [
        depthFigure("A", "View A Depth", record.modalities.depth.A),
        depthFigure("B", "View B Depth", record.modalities.depth.B),
        depthFigure("C", "Hidden C Depth", record.modalities.depth.C)
      ].join("");

      el.questionView.classList.toggle("hidden", state.tab !== "question");
      el.modalitiesView.classList.toggle("hidden", state.tab !== "modalities");
      el.tabQuestion.classList.toggle("active", state.tab === "question");
      el.tabModalities.classList.toggle("active", state.tab === "modalities");
    }

    function render() {
      if (state.index >= state.filtered.length) state.index = Math.max(0, state.filtered.length - 1);
      renderList();
      renderDetail();
    }

    function move(delta) {
      if (!state.filtered.length) return;
      state.index = (state.index + delta + state.filtered.length) % state.filtered.length;
      render();
    }

    function applySearch() {
      const term = el.search.value.trim().toLowerCase();
      state.filtered = state.records.filter((record) => {
        const room = record.modalities.room;
        const haystack = [
          record.rank,
          record.scanId,
          record.itemId,
          record.answer,
          record.question,
          roomText(room.start),
          roomText(room.hidden)
        ].join(" ").toLowerCase();
        return haystack.includes(term);
      });
      state.index = 0;
      render();
    }

    el.prev.addEventListener("click", () => move(-1));
    el.next.addEventListener("click", () => move(1));
    el.search.addEventListener("input", applySearch);
    el.showOracle.addEventListener("change", renderDetail);
    el.tabQuestion.addEventListener("click", () => {
      state.tab = "question";
      renderDetail();
    });
    el.tabModalities.addEventListener("click", () => {
      state.tab = "modalities";
      renderDetail();
    });
    window.addEventListener("keydown", (event) => {
      if (event.target === el.search) return;
      if (event.key === "ArrowLeft") move(-1);
      if (event.key === "ArrowRight") move(1);
    });

    fetch("viewer_data.json")
      .then((response) => response.json())
      .then((data) => {
        state.records = data.records;
        state.filtered = data.records.slice();
        render();
      })
      .catch((error) => {
        el.list.innerHTML = `<div class="empty">Failed to load viewer_data.json: ${error.message}</div>`;
      });
  </script>
</body>
</html>
