  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --panel-soft: #eef2f6;
      --text: #18202a;
      --muted: #647181;
      --line: #d9e0e8;
      --accent: #1f6feb;
      --accent-dark: #174ea6;
      --good: #147d64;
      --shadow: 0 10px 28px rgba(24, 32, 42, 0.09);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: #fbfcfd;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .sidebar-header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--line);
    }

    .title {
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.25;
      font-weight: 700;
    }

    .stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--muted);
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
      white-space: nowrap;
    }

    .search {
      width: 100%;
      margin-top: 14px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 8px;
      padding: 10px 12px;
      outline: none;
    }

    .search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(31, 111, 235, 0.14);
    }

    .list {
      overflow: auto;
      padding: 10px;
    }

    .item {
      width: 100%;
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      text-align: left;
      border: 1px solid transparent;
      background: transparent;
      border-radius: 8px;
      padding: 8px;
      color: var(--text);
      cursor: pointer;
    }

    .item:hover {
      background: var(--panel-soft);
    }

    .item.active {
      background: #e8f1ff;
      border-color: #bad6ff;
    }

    .rank {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--panel);
      border: 1px solid var(--line);
      color: var(--accent-dark);
      font-weight: 700;
    }

    .item-title {
      font-size: 14px;
      font-weight: 650;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .item-meta {
      margin-top: 3px;
      font-size: 12px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .main {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: rgba(246, 247, 249, 0.94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .nav {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .icon-button,
    .text-button {
      min-height: 38px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 8px;
      cursor: pointer;
    }

    .icon-button {
      width: 42px;
      display: grid;
      place-items: center;
      font-size: 20px;
      line-height: 1;
    }

    .text-button {
      padding: 0 12px;
      font-weight: 650;
    }

    .icon-button:hover,
    .text-button:hover {
      border-color: #b8c4d2;
      box-shadow: 0 1px 0 rgba(24, 32, 42, 0.04);
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 7px 10px;
      border-radius: 8px;
      color: var(--muted);
      font-size: 14px;
      user-select: none;
    }

    .toggle input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    .content {
      width: min(1500px, 100%);
      margin: 0 auto;
      padding: 18px;
    }

    .question-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 16px;
    }

    .question-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .question-head h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
    }

    .scan {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .question-text {
      margin: 0;
      color: #24303d;
      font-size: 17px;
      line-height: 1.55;
    }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      align-items: start;
    }

    .image-grid.show-oracle {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .figure {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .figure-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      min-height: 42px;
      padding: 9px 12px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
      font-size: 14px;
      font-weight: 700;
    }

    .figure-header span:last-child {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .figure img {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: contain;
      background: #0f141a;
    }

    .oracle {
      display: none;
    }

    .show-oracle .oracle {
      display: block;
    }

    .answer {
      display: none;
      margin-top: 16px;
      background: #edf8f5;
      border: 1px solid #bfe4d9;
      border-radius: 8px;
      padding: 14px 16px;
      color: #123e34;
    }

    .answer.visible {
      display: block;
    }

    .answer h2 {
      margin: 0 0 8px;
      color: var(--good);
      font-size: 15px;
    }

    .answer p {
      margin: 0;
      font-size: 15px;
      line-height: 1.5;
    }

    .empty {
      padding: 18px;
      color: var(--muted);
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        max-height: 320px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .topbar {
        position: static;
        flex-wrap: wrap;
      }

      .image-grid,
      .image-grid.show-oracle {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

    }

    function renderList() {
      el.list.innerHTML = "";
      if (state.filtered.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No matches";
        el.list.appendChild(empty);
        return;
      }

      state.filtered.forEach((record, idx) => {
        const button = document.createElement("button");
        button.className = `item ${idx === state.index ? "active" : ""}`;
        button.innerHTML = `
          <span class="rank">${String(record.rank).padStart(2, "0")}</span>
          <span>
            <span class="item-title">${record.scanId}</span>
            <span class="item-meta">${record.answer}</span>
          </span>
        `;
        button.addEventListener("click", () => {
          state.index = idx;
          render();
        });
        el.list.appendChild(button);
      });
    }

    function renderDetail() {
      const record = state.filtered[state.index];
      if (!record) {
        return;
      }

      el.itemTitle.textContent = `Question ${String(record.rank).padStart(2, "0")}`;
      el.scan.textContent = `${record.scanId} / ${record.itemId}`;
      const override = questionOverrides[record.rank] || {};
      el.question.textContent = override.question || question;
      el.answerText.textContent = override.answer || record.answer;
      el.viewA.src = imagePath(record, "view_A.png");
      el.viewB.src = imagePath(record, "view_B.png");
      el.viewC.src = imagePath(record, "view_C_hidden_oracle.png");
      el.imageGrid.classList.toggle("show-oracle", el.showOracle.checked);
      el.answer.classList.toggle("visible", el.showOracle.checked);
      el.openFolder.onclick = () => window.open(imagePath(record, "contact_sheet.png"), "_blank");
    }

    function render() {
      if (state.index >= state.filtered.length) {
        state.index = Math.max(0, state.filtered.length - 1);
      }
      renderList();
      renderDetail();
    }

    function move(step) {
      if (state.filtered.length === 0) {
        return;
      }
      state.index = (state.index + step + state.filtered.length) % state.filtered.length;
      render();
    }

    el.prev.addEventListener("click", () => move(-1));
    el.next.addEventListener("click", () => move(1));
    el.showOracle.addEventListener("change", renderDetail);
    el.search.addEventListener("input", () => {
      const term = el.search.value.trim().toLowerCase();
      state.filtered = records.filter((record) => {
        const haystack = `${record.rank} ${record.scanId} ${record.itemId} ${record.answer}`.toLowerCase();
        return haystack.includes(term);
      });
      state.index = 0;
      render();
    });

    document.addEventListener("keydown", (event) => {
      if (event.target === el.search) {
        return;
      }
      if (event.key === "ArrowLeft") {
        move(-1);
      } else if (event.key === "ArrowRight") {
        move(1);
      } else if (event.key.toLowerCase() === "c") {
        el.showOracle.checked = !el.showOracle.checked;
        renderDetail();
      }
    });

    render();
  </script>
</body>
</html>
